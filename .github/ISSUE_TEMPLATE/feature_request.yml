name: "💡 Feature request"
description: "Suggest an improvement or a new capability."
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: "Thanks for the idea! Please describe the problem first, then your proposed solution."

  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: "What are you trying to do that's hard or impossible today?"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: "What would you like the app to do?"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: "Other approaches or workarounds you've thought about."
    validations:
      required: false

  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: "I searched existing issues and this isn't a duplicate."
          required: true
