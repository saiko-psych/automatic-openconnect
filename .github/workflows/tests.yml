name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q

  # macOS validation on real Apple hardware. Sparing on purpose: PRs only
  # (macOS runner minutes count 10x), so it covers the cross-platform PR
  # without firing on every main push. Headless — verifies the _darwin
  # backend + package import/run; the live GUI window and real VPN tunnel
  # still need a physical Mac.
  test-macos:
    if: github.event_name == 'pull_request'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Import smoke (package + macOS backend)
        run: python -c "import sys, automatic_openconnect, automatic_openconnect._darwin; print('import OK on', sys.platform)"
      - name: Run tests
        run: pytest -q
